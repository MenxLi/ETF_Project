<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">

.badge-OPEN  {background:#dcfce7;color:#15803d}

<script>
const { createApp, ref, reactive, computed, onMounted, watch, nextTick } = Vue;

// ── API ────────────────────────────────────────────────────────
async function api(method, url, body) {
  const r = await fetch(url, {
    method,
    headers: {'Content-Type':'application/json'},
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) throw new Error(await r.text());
  if (r.status === 204) return null;
  return r.json();
}

const fmtCash = v => '¥' + Math.round(v||0).toLocaleString('zh-CN');
const fmtPct  = v => ((v||0)*100).toFixed(0) + '%';
const todayStr = () => new Date().toISOString().split('T')[0];

// ══════════════════════════════════════════════════════════════
// 信号看板
// ══════════════════════════════════════════════════════════════
const SignalView = {
  setup() {
    const data = ref(null);
    const loading = ref(true);
    const err = ref('');
    const advMap = { OPEN:'开仓', ADD:'加仓', HOLD:'持有', REDUCE:'减仓', SKIP:'跳过' };
    onMounted(async () => {
      try { data.value = await api('GET', '/api/signals'); }
      catch(e) { err.value = e.message; }
      finally { loading.value = false; }
    });
    return { data, loading, err, advMap };
  },
  template: `
    <div class="p-6">
      <h2 class="text-xl font-bold text-gray-800 mb-5">📡 今日信号看板</h2>
      <div v-if="loading" class="text-center text-gray-400 py-20">加载中…</div>
      <div v-else-if="err" class="text-center text-red-500 py-10">{{ err }}</div>
      <div v-else-if="!data || !data.signals || !data.signals.length" class="text-center py-24 text-gray-400">
        <div style="font-size:3rem">⚪</div>
        <p class="mt-3 text-lg">今日无信号</p>
        <p class="text-sm mt-1">候选池文件不存在或信号数为零</p>
      </div>
      <template v-else>
        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">信号日期</div>
            <div class="font-bold text-gray-800">{{ data.trade_date || '—' }}</div>
          </div>
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">做多信号数</div>
            <div class="font-bold text-2xl text-green-600">{{ data.signals.length }}</div>
          </div>
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">平均做多概率</div>
            <div class="font-bold text-2xl text-blue-600">
              {{ (data.signals.reduce((s,x)=>s+x.prob_up,0)/data.signals.length*100).toFixed(1) }}%
            </div>
          </div>
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">生成时间</div>
            <div class="font-bold text-gray-700">{{ (data.generated_at||'').substr(11,5) || '—' }}</div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-xs text-gray-400">
              <tr>
                <th class="px-4 py-3 text-left">建议</th>
                <th class="px-4 py-3 text-left">标的</th>
                <th class="px-4 py-3 text-center">做多概率</th>
                <th class="px-4 py-3 text-right">收盘价</th>
                <th class="px-4 py-3 text-right">涨跌幅</th>
                <th class="px-4 py-3 text-left">说明</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="s in data.signals" :key="s.code" class="border-t border-gray-50 hover:bg-gray-50">
                <td class="px-4 py-3">
                  <span :class="'badge badge-'+(s.advice||'OPEN')">{{ advMap[s.advice||'OPEN']||s.advice }}</span>
                </td>
                <td class="px-4 py-3">
                  <div class="font-semibold text-gray-800">{{ s.name }}</div>
                  <div class="text-xs text-gray-400">{{ s.code }}</div>
                </td>
                <td class="px-4 py-3 text-center">
                  <div class="font-semibold">{{ (s.prob_up*100).toFixed(1) }}%</div>
                  <div class="h-1.5 bg-gray-100 rounded mt-1 mx-auto" style="width:56px">
                    <div class="h-1.5 bg-green-500 rounded" :style="{width:(s.prob_up*100)+'%'}"></div>
                  </div>
                </td>
                <td class="px-4 py-3 text-right">{{ s.close ? s.close.toFixed(3) : '—' }}</td>
                <td class="px-4 py-3 text-right font-medium" :class="(s.pct_chg||0)>=0?'text-green-600':'text-red-500'">
                  {{ (s.pct_chg||0)>=0?'+':'' }}{{ (s.pct_chg||0).toFixed(2) }}%

                <td class="px-4 py-3 text-gray-400 text-xs max-w-xs truncate">{{ s.advice_reason||'' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </template>
    </div>`
};

// ETF 行情
// ══════════════════════════════════════════════════════════════
const EtfView = {
  props: ['etfList'],
  setup(props) {
    const query = ref('');
    const selCode = ref('');
    const hist = ref([]);
    const loading = ref(false);
    const chartInst = ref(null);
    const canvas = ref(null);

    const filtered = computed(() => {
      const q = (query.value||'').toLowerCase();
      const entries = Object.entries(props.etfList || {});
      if (!q) return entries.slice(0, 30);
      return entries.filter(([c,n]) => c.includes(q) || n.includes(q)).slice(0, 30);
    });

    async function loadHist(code) {
      selCode.value = code; loading.value = true; hist.value = [];
      try {
        hist.value = await api('GET', '/api/etf-history/' + code);
        loading.value = false;   // turn off spinner BEFORE nextTick so canvas enters DOM
        await nextTick();
        drawChart();
      } catch(e) {
        hist.value = [];
        loading.value = false;
      }
    }

    function drawChart() {
      if (!canvas.value || !hist.value.length) return;
      if (chartInst.value) chartInst.value.destroy();
      chartInst.value = new Chart(canvas.value, {
        type: 'line',
        data: {
          labels: hist.value.map(d => d.date),
          datasets: [{
            label: '收盘价', data: hist.value.map(d => d.close),
            borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.07)',
            borderWidth: 2, pointRadius: 0, fill: true, tension: 0.1,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { maxTicksLimit: 8, font:{ size:11 } }, grid:{ display:false } },
            y: { ticks: { font:{ size:11 } } }
          }
        }
      });
    }

    const latest = computed(() => hist.value.length ? hist.value[hist.value.length-1] : null);
    const hiPrice = computed(() => hist.value.length ? Math.max(...hist.value.map(d=>d.high)).toFixed(3) : '—');
    const loPrice = computed(() => hist.value.length ? Math.min(...hist.value.map(d=>d.low)).toFixed(3) : '—');

    return { query, selCode, hist, loading, filtered, loadHist, canvas, latest, hiPrice, loPrice };
  },
  template: `
    <div class="p-6">
      <h2 class="text-xl font-bold text-gray-800 mb-5">📈 ETF 行情</h2>
      <div style="display:flex;gap:16px;height:calc(100vh - 140px)">
        <div style="width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:8px">
          <input v-model="query" placeholder="搜索代码或名称"
                 class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <div class="bg-white border rounded-xl overflow-y-auto flex-1 shadow-sm">
            <div v-for="[code,name] in filtered" :key="code"
                 @click="loadHist(code)"
                 class="px-3 py-2.5 cursor-pointer border-b border-gray-50 last:border-0 text-sm transition"
                 :class="selCode===code?'bg-blue-50 text-blue-700 font-medium':'text-gray-700 hover:bg-gray-50'">
              <div class="font-medium">{{ code }}</div>
              <div class="text-xs text-gray-400 truncate">{{ name }}</div>
            </div>
          </div>
        </div>
        <div style="flex:1;min-width:0">
          <div v-if="!selCode" class="flex items-center justify-center h-64 text-gray-400">
            <div class="text-center"><div style="font-size:3rem">📊</div><p class="mt-2">从左侧选择 ETF</p></div>
          </div>
          <div v-else-if="loading" class="flex items-center justify-center h-64 text-gray-400">加载中…</div>
          <div v-else-if="!hist.length" class="flex items-center justify-center h-64 text-gray-400">暂无数据</div>
          <div v-else class="bg-white rounded-xl shadow-sm border p-5 h-full flex flex-col">
            <div class="flex items-center justify-between mb-3 flex-shrink-0">
              <div>
                <span class="font-bold text-gray-800 text-lg">{{ selCode }}</span>
                <span class="text-gray-400 text-sm ml-2">{{ (etfList||{})[selCode] }}</span>
              </div>
              <div v-if="latest" class="text-right">
                <span class="font-bold text-2xl text-gray-800">{{ latest.close.toFixed(3) }}</span>
                <span class="text-xs text-gray-400 ml-1">最新收盘</span>
              </div>
            </div>
            <div style="flex:1;min-height:0">
              <canvas ref="canvas"></canvas>
            </div>
            <div class="grid grid-cols-4 gap-3 mt-4 text-sm flex-shrink-0">
              <div class="text-center"><div class="text-gray-400 text-xs">区间最高</div><div class="font-semibold text-red-500">{{ hiPrice }}</div></div>
              <div class="text-center"><div class="text-gray-400 text-xs">区间最低</div><div class="font-semibold text-green-600">{{ loPrice }}</div></div>
              <div class="text-center"><div class="text-gray-400 text-xs">数据点</div><div class="font-semibold text-gray-700">{{ hist.length }}</div></div>
              <div class="text-center"><div class="text-gray-400 text-xs">起始日期</div><div class="font-semibold text-gray-700">{{ hist[0].date }}</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>`
};

// 邮件记录
// ══════════════════════════════════════════════════════════════
const EmailView = {
  setup() {
    const logs = ref([]);
    const loading = ref(true);
    onMounted(async () => {
      try { logs.value = await api('GET', '/api/email-log'); }
      catch(e) {}
      finally { loading.value = false; }
    });
    const successCount = computed(() => logs.value.filter(l=>l.success).length);
    const failCount    = computed(() => logs.value.filter(l=>!l.success).length);
    return { logs, loading, successCount, failCount };
  },
  template: `
    <div class="p-6">
      <h2 class="text-xl font-bold text-gray-800 mb-5">📧 邮件发送记录</h2>
      <div v-if="loading" class="text-center text-gray-400 py-20">加载中…</div>
      <template v-else>
        <div v-if="logs.length" class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">总发送</div>
            <div class="font-bold text-2xl text-gray-800">{{ logs.length }}</div>
          </div>
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">成功</div>
            <div class="font-bold text-2xl text-green-600">{{ successCount }}</div>
          </div>
          <div class="bg-white rounded-xl p-4 shadow-sm border">
            <div class="text-gray-400 text-xs mb-1">失败</div>
            <div class="font-bold text-2xl text-red-500">{{ failCount }}</div>
          </div>
        </div>
        <div v-if="!logs.length" class="text-center py-24 text-gray-400">
          <div style="font-size:3rem">📭</div>
          <p class="mt-3 text-lg">暂无邮件记录</p>
          <p class="text-sm mt-1">发送邮件后会自动记录在这里</p>
        </div>
        <div v-else class="bg-white rounded-xl shadow-sm border overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-xs text-gray-400">
              <tr>
                <th class="px-4 py-3 text-left">时间</th>
                <th class="px-4 py-3 text-left">收件人</th>
                <th class="px-4 py-3 text-left">主题</th>
                <th class="px-4 py-3 text-center">状态</th>

            </thead>
            <tbody>
              <tr v-for="(log,i) in logs" :key="i" class="border-t border-gray-50 hover:bg-gray-50">
                <td class="px-4 py-3 text-gray-400 whitespace-nowrap text-xs">{{ log.timestamp }}</td>
                <td class="px-4 py-3 text-gray-700">{{ log.to }}</td>

                  <span v-else class="badge" style="background:#fee2e2;color:#b91c1c" :title="log.error||''">✗ 失败</span>

      return [
        { label:'今日信号候选池', key:'signals',    desc:'每日收盘后由 generator.py 生成', icon:'📡' },

        { label:'用户注册表',     key:'users',      desc:'portfolios/users.json',          icon:'👥' },
        { label:'邮件发送日志',   key:'email_log',  desc:'logs/email_log.jsonl',           icon:'📧' },

    });

  },
  template: `
    <div class="p-6">
      <h2 class="text-xl font-bold text-gray-800 mb-5">⚙️ 系统状态</h2>
      <div v-if="loading" class="text-center text-gray-400 py-20">加载中…</div>
      <div v-else-if="!status" class="text-center text-red-500 py-10">状态加载失败</div>

              <div class="text-xs text-gray-400 mt-1">{{ c.desc }}</div>

        </div>
      </div>

};

// 持仓管理
// ══════════════════════════════════════════════════════════════
const PortfolioView = {
  props: ['users','etfList'],
  emits: ['refresh','status'],
  setup(props, { emit }) {
    const selId = ref(null);
    const tab   = ref('settings');
    const pf    = ref(null);
    const showUserModal = ref(false);
    const showPosModal  = ref(false);
    const editCode      = ref(null);
    const posTitle      = ref('新增持仓');

    const newUser = reactive({ name:'', email:'', cash:100000, active:true });
    const posForm = reactive({ code:'', name:'', shares:'', cost_price:'', buy_date:todayStr() });
    const cfg     = reactive({ name:'', email:'', cash:0, max_position_pct:0.3, max_sector_pct:0.5, active:true });

    const selUser  = computed(() => (props.users||[]).find(u => u.id === selId.value));
    const totalAss = computed(() => {
      if (!pf.value) return 0;
      return (pf.value.cash||0) + (pf.value.positions||[]).reduce((s,p)=>s+p.shares*p.cost_price,0);
    });

    async function selectUser(id) {
      selId.value = id; tab.value = 'settings';
      try {
        pf.value = await api('GET', '/api/portfolio/' + id);
      } catch(e) { emit('status', '加载失败: ' + e.message); }
    }

    watch(selUser, u => { if (!u) return; cfg.name=u.name; cfg.email=u.email||''; cfg.active=u.active; });
    watch(pf,      p => { if (!p) return; cfg.cash=p.cash; cfg.max_position_pct=p.max_position_pct; cfg.max_sector_pct=p.max_sector_pct; });

    async function saveSettings() {
      try {
        emit('status', '保存中…');
        await api('PUT', '/api/users/' + selId.value, { name:cfg.name, email:cfg.email, active:cfg.active });
        pf.value = await api('PUT', '/api/portfolio/' + selId.value, { cash:cfg.cash, max_position_pct:cfg.max_position_pct, max_sector_pct:cfg.max_sector_pct });
        emit('refresh');
        emit('status', '已保存 ✓');
      } catch(e) { emit('status', '保存失败: ' + e.message); }
    }

    function onCodeInput() { posForm.name = (props.etfList||{})[posForm.code] || ''; }

    function openAddPos() {
      editCode.value = null; posTitle.value = '新增持仓';
      posForm.code=''; posForm.name=''; posForm.shares=''; posForm.cost_price=''; posForm.buy_date=todayStr();
      showPosModal.value = true;
    }
    function openEditPos(code) {
      const pos = (pf.value?.positions||[]).find(p=>p.code===code);
      if (!pos) return;
      editCode.value = code; posTitle.value = '编辑持仓';
      posForm.code=pos.code; posForm.name=pos.name; posForm.shares=pos.shares;
      posForm.cost_price=pos.cost_price; posForm.buy_date=pos.buy_date;
      showPosModal.value = true;
    }

    async function submitPos() {
      const code = posForm.code.trim();
      const name = posForm.name || (props.etfList||{})[code] || code;
      const shares = parseFloat(posForm.shares);
      const cost   = parseFloat(posForm.cost_price);
      if (!code || isNaN(shares) || isNaN(cost)) { alert('请填写代码、股数和成本价'); return; }
      try {
        emit('status', '保存中…');
        await api('POST', '/api/portfolio/' + selId.value + '/positions', { code,name,shares,cost_price:cost,buy_date:posForm.buy_date });

        showPosModal.value = false;
        emit('status', '已保存 ✓');

    }

        emit('refresh'); emit('status', '已删除 ✓');
      } catch(e) { emit('status', '删除失败: ' + e.message); }
    }

    return { selId, tab, pf, showUserModal, showPosModal, editCode, posTitle, newUser, posForm, cfg,

             openAddPos, openEditPos, submitPos, delPos, submitAddUser, delUser,

createApp({
  components: { PortfolioView, SignalView, EtfView, BacktestView, EmailView, SystemView },
  setup() {
    const page   = ref('portfolio');
    const users  = ref([]);
    const etfMap = ref({});
    const status = ref('加载中…');

    const nav = [
      { key:'portfolio', icon:'💼', label:'持仓管理' },
      { key:'signals',   icon:'📡', label:'信号看板' },
      { key:'market',    icon:'📈', label:'ETF 行情' },
      { key:'backtest',  icon:'🔬', label:'回测结果' },
      { key:'emails',    icon:'📧', label:'邮件记录' },
      { key:'system',    icon:'⚙️',  label:'系统状态' },
    ];

    async function loadUsers() {
      try { users.value = await api('GET', '/api/users'); } catch(e) {}
    }

    onMounted(async () => {
      try {
        const [u, e] = await Promise.all([api('GET','/api/users'), api('GET','/api/etf-list')]);
        users.value = u; etfMap.value = e;
        status.value = '就绪';
      } catch(e) { status.value = '加载失败'; }
    });

    const dateStr = new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
    return { page, users, etfMap, status, nav, loadUsers, dateStr };
  },
